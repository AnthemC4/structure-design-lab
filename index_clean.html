            moveDownBtn.addEventListener('click', () => {
                if (selectedStraw) {
                    // 保存操作前状态
                    saveToUndoHistory();
                    
                    selectedStraw.position.y -= 0.5;

            });
            
            doneEditBtn.addEventListener('click', () => {
                deselectStraw();
                showMessage('✅', '编辑完成');
            });
            
            saveBtn.addEventListener('click', () => {
                // 保存前先取消选中
                deselectStraw();
                
                if (straws.length === 0) {
                    showMessage('⚠️', '还没有设计内容\n请先添加吸管');
                    return;
                }
                
                // 确定保存目标
                let saveIndex = currentDesignIndex;
                
                // 如果当前没有选中任何方案，找第一个空方案
                if (saveIndex === -1) {
                    saveIndex = designs.findIndex(d => d === null);
                }
                
                // 如果所有方案都满了，默认保存到第一个
                if (saveIndex === -1) {
                    saveIndex = 0;
                }
                
                // 检查目标方案是否已有内容，需要确认覆盖
                if (designs[saveIndex] !== null) {
                    if (!confirm(`方案 ${saveIndex + 1} 已有设计内容，确定要覆盖吗？\n\n覆盖后原设计将无法恢复。`)) {
                        return; // 用户取消覆盖
                    }
                }
                
                // 保存设计数据（包含方向信息）
                const designData = straws.map(straw => ({
                    position: { x: straw.position.x, y: straw.position.y, z: straw.position.z },
                    rotation: { x: straw.rotation.x, y: straw.rotation.y, z: straw.rotation.z },
                    direction: straw.userData.direction || 'horizontal'
                }));
                
                designs[saveIndex] = designData;
                currentDesignIndex = saveIndex; // 更新当前方案
                
                // 更新 UI
                updateDesignsUI();
                
                // 显示保存成功
                const successMsg = document.getElementById('save-success');
                successMsg.classList.add('show');
                setTimeout(() => successMsg.classList.remove('show'), 2000);
                
                showMessage('💾', `设计已保存到方案 ${saveIndex + 1}`);
            });
        }
        
        function updateDesignsUI() {
            const slots = document.querySelectorAll('.design-slot');
            slots.forEach((slot, index) => {
                const isActive = (index === currentDesignIndex);
                
                if (designs[index]) {
                    slot.classList.remove('empty');
                    slot.textContent = `方案 ${index + 1}（${designs[index].length}根）`;
                    slot.classList.toggle('active', isActive);
                } else {
                    slot.classList.add('empty');
                    slot.textContent = `方案 ${index + 1}（空）`;
                    slot.classList.toggle('active', isActive);
                }
                
                slot.onclick = () => loadDesign(index);
            });
        }
        
        function loadDesign(index) {
            deselectStraw();
            
            // 目标方案为空：不清空当前内容，只是切换当前方案索引，用户可以继续编辑
            if (!designs[index]) {
                // 如果有未保存的内容，提示用户（延长显示时间到 3 秒）
                if (straws.length > 0) {
                    showMessage('ℹ️', `已切换到方案 ${index + 1}（空）\n\n当前设计未保存，请记得先保存再切换其他方案`, 3000);
                } else {
                    showMessage('✅', `已切换到方案 ${index + 1}（空）`, 3000);
                }
                currentDesignIndex = index;
                updateDesignsUI();
                clearUndoHistory(); // 切换方案时清空历史
                return;
            }
            
            // 目标方案有内容：确认是否切换（切换会清空当前未保存的内容）
            if (straws.length > 0) {
                if (!confirm('切换方案将清空当前未保存的设计，确定继续吗？\n\n当前设计需要先保存，否则会丢失。')) {
                    return;
                }
            }
            
            // 清空当前设计
            straws.forEach(straw => scene.remove(straw));
            straws = [];
            
            // 加载已保存的设计
            designs[index].forEach(data => {
                const straw = createStraw(
                    new THREE.Vector3(data.position.x, data.position.y, data.position.z),
                    data.direction || 'horizontal',
                    data.rotation.y
                );
                // 恢复完整的旋转信息
                straw.rotation.x = data.rotation.x;
                straw.rotation.y = data.rotation.y;
                straw.rotation.z = data.rotation.z;
                scene.add(straw);
                straws.push(straw);
            });
            
            remainingStraws = 20 - straws.length;
            updateCountDisplay();
            currentDesignIndex = index;
            updateDesignsUI();
            clearUndoHistory(); // 切换方案时清空历史
            
            showMessage('✅', `已加载方案 ${index + 1}`);
        }
        
        // ========== 消息提示 ==========
        function showMessage(icon, content, duration = 2000) {
            const msgDiv = document.getElementById('message');
            const title = document.getElementById('message-title');
            const text = document.getElementById('message-content');
            
            title.textContent = icon;
            text.textContent = content;
            msgDiv.classList.add('show');
            
            setTimeout(() => {
                msgDiv.classList.remove('show');
            }, duration);
        }
        
        // ========== 窗口大小调整 ==========
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ========== 渲染循环 ==========
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // ========== 页面加载完成后初始化 ==========
        window.addEventListener('load', () => {
            initScene();
            setupToolbar();
            showMessage('🎉', '欢迎使用吸管搭建实验室！\n点击"添加吸管"开始设计');
        });
