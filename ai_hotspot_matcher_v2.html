        function getHeatLevel(heat) {
            if (heat >= 9000) return 'high';
            if (heat >= 7000) return 'medium';
            return 'normal';
        }

        function renderHotspots(filtered = null) {
            const list = document.getElementById('hotspotList');
            const data = filtered || hotspots.slice(0, displayCount);
            
            if (data.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无热点数据</div>';
                return;

            list.innerHTML = data.map(h => {
                const level = getHeatLevel(h.heat);
                return `<div class="hotspot-item ${level}" onclick="showHotspotDetail(${h.id})">
                    <h4>${h.title}</h4>
                    <div class="meta">
                        <span class="tag tag-source">${h.source}</span>
                        <span class="tag tag-region">${h.region}</span>

                // 1. 品牌直接关联（最高优先级）
                if (hTags.includes(b.name.toLowerCase())) { 
                    score += 40; 
                    reasons.push('品牌直接关联');
                    dimensions['品牌关联'] = '+40';
                }
                
                // 2. 行业匹配
                if (hTags.includes('汽车') && bIndustry.includes('汽车')) { 
                    score += 25; 
                    reasons.push('汽车行业直接匹配');
                    dimensions['行业匹配'] = '+25';
                }
                if (hTags.includes('新能源') && bIndustry.includes('新能源')) { 
                    score += 30; 
                    reasons.push('新能源领域高度相关');
                    dimensions['行业匹配'] = '+30';
                }
                
                // 3. 关键词标签匹配
                const tagMatches = b.tags.filter(t => hTags.includes(t.toLowerCase()));
                if (tagMatches.length > 0) {
                    score += tagMatches.length * 10;
                    reasons.push(`标签匹配：${tagMatches.join('、')}`);
                    dimensions['标签匹配'] = `+${tagMatches.length * 10}`;
                }
                
                // 4. 品牌调性匹配
                if (hTags.includes('科技') && bTone.includes('科技')) { 
                    score += 15; 
                    reasons.push('科技属性契合');
                    dimensions['调性匹配'] = '+15';
                }
                if (hTags.includes('家庭') && bTone.includes('家庭')) { 
                    score += 15; 
                    reasons.push('家庭场景契合');
                    dimensions['调性匹配'] = '+15';
                }
                if (hTags.includes('高端') && bTone.includes('高端')) { 
                    score += 15; 
                    reasons.push('高端定位契合');
                    dimensions['调性匹配'] = '+15';
                }
                
                // 5. 目标人群匹配
                if (hTags.includes('年轻') && bTarget.includes('年轻')) { 
                    score += 10; 
                    reasons.push('年轻人群匹配');
                    dimensions['人群匹配'] = '+10';
                }
                if (hTags.includes('家庭') && bTarget.includes('家庭')) { 
                    score += 10; 
                    reasons.push('家庭人群匹配');
                    dimensions['人群匹配'] = '+10';
                }
                
                // 6. 消费层级匹配
                if (hTags.includes('高端') && (b.level === '高' || b.level === '超高')) { 
                    score += 10; 
                    reasons.push('消费层级匹配');
                    dimensions['消费层级'] = '+10';
                }
                
                // 7. 媒体投放偏好
                if (hotspot.source === '微博' && b.media.includes('微博')) { 
                    score += 5; 
                    reasons.push('媒体渠道匹配');
                    dimensions['媒体匹配'] = '+5';
                }
                if (hotspot.source === '抖音' && b.media.includes('抖音')) { 
                    score += 5; 
                    reasons.push('媒体渠道匹配');
                    dimensions['媒体匹配'] = '+5';
                }
                if (hotspot.source === 'B 站' && b.media.includes('B 站')) { 
                    score += 5; 
                    reasons.push('媒体渠道匹配');
                    dimensions['媒体匹配'] = '+5';
                }
                
                // 8. 热点敏感度加成
                if (b.sensitivity === '极高') score *= 1.2;
                if (b.sensitivity === '高') score *= 1.1;
                
                if (score > 25) {
                    matches.push({ 
                        brand: b.name, 
                        brandData: b,
                        reason: reasons.join('；'), 
                        dimensions: dimensions,
                        score: Math.min(Math.round(score), 100) 
                    });
                }
            });
            return matches.sort((a,b) => b.score - a.score);
        }

        function renderRecommendations() {
            const list = document.getElementById('recommendationList');
            let data = recommendations;
            if (currentFilter === 'pending') data = recommendations.filter(r => r.status === 'pending');
            if (currentFilter === 'adopted') data = recommendations.filter(r => r.status === 'adopted');
            
            if (data.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无推荐策略</div>';
                return;
            }

            list.innerHTML = data.map((r, i) => {
                const scoreClass = r.score >= 80 ? 'score-high' : r.score >= 60 ? 'score-medium' : 'score-low';
                const dimHtml = Object.entries(r.dimensions).map(([k,v]) => 
                    `<div class="match-dim"><strong>${k}：</strong>${v}</div>`
                ).join('');
                
                return `<div class="match-card">
                    <h4>📍 ${r.hotspotTitle}</h4>
                    <div class="detail">${r.hotspotDesc}</div>
                    <div class="detail"><strong>🏷️ 匹配品牌：</strong>${r.brand} <span class="brand-tag">${r.brandData.industry}</span> <span class="brand-tag">${r.brandData.level}</span></div>
                    <div class="detail"><strong>💡 匹配原因：</strong>${r.reason}</div>
                    <div class="match-dimensions">${dimHtml}</div>
                    <div class="detail"><strong>📊 匹配程度：</strong><span class="score ${scoreClass}">${r.score}分</span></div>
                    <div class="actions">
                        <button class="btn btn-success" onclick="showWeightModal(${i})">✚ 确认加权投放</button>
                        <button class="btn btn-danger" onclick="rejectRecommendation(${i})">✗ 不采纳</button>
                    </div>
                </div>`;
            }).join('');
        }

        function showHotspotDetail(id) {
            const h = hotspots.find(x => x.id === id);
            if (!h) return;
            document.getElementById('modalTitle').textContent = h.title;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>来源：</strong>${h.source}</p>
                <p><strong>地区：</strong>${h.region}</p>
                <p><strong>分类：</strong>${h.category}</p>
                <p><strong>热度指数：</strong>${h.heat}</p>
                <p><strong>发布时间：</strong>${h.time}</p>
                <p><strong>关键词：</strong>${h.tags.join('、')}</p>
                <p><strong>原链接：</strong><a href="${h.url}" target="_blank">${h.url}</a></p>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function generateSingleRecommendation(id) {
            const h = hotspots.find(x => x.id === id);
            if (!h) return;
            const matches = findMatchingBrands(h);
            if (matches.length > 0) {
                recommendations.unshift({
                    hotspotId: h.id,
                    hotspotTitle: h.title,
                    hotspotDesc: `${h.source} · ${h.region} · 热度${h.heat}`,
                    brand: matches[0].brand,
                    brandData: matches[0].brandData,
                    reason: matches[0].reason,
                    dimensions: matches[0].dimensions,
                    score: matches[0].score,
                    status: 'pending'
                });
                renderRecommendations();
                updateStats();
                showNotification('✅ 已生成投放建议');
            } else {
                showNotification('⚠️ 未找到匹配的品牌');
            }
        }

        function generateRecommendation() {
            closeModal();
            showNotification('✅ 已生成投放建议');
        }

        let currentWeightIndex = -1;
        function showWeightModal(index) {
            currentWeightIndex = index;
            const r = recommendations[index];
            document.getElementById('weightModalBody').innerHTML = `
                <p><strong>热点：</strong>${r.hotspotTitle}</p>
                <p><strong>品牌：</strong>${r.brand}</p>
                <p><strong>行业：</strong>${r.brandData.industry}</p>
                <p><strong>匹配度：</strong>${r.score}分</p>
                <p><strong>原因：</strong>${r.reason}</p>
                <hr style="margin:15px 0;border:none;border-top:1px solid #eee;">
                <p><strong>加权操作：</strong></p>
                <ul style="margin-left:20px;color:#666;">
                    <li>提升该品牌广告在"${r.hotspotTitle}"相关关键词下的曝光权重</li>
                    <li>增加信息流广告展现频次 30%</li>
                    <li>优先投放到关注该热点的用户群体</li>
                    <li>定向投放到${r.brandData.target}人群</li>
                </ul>
            `;
            document.getElementById('weightModal').classList.add('active');
        }

        function closeWeightModal() {
            document.getElementById('weightModal').classList.remove('active');
            currentWeightIndex = -1;
        }

        function confirmWeight() {
            if (currentWeightIndex >= 0) {
                recommendations[currentWeightIndex].status = 'adopted';
                renderRecommendations();
                updateStats();
                closeWeightModal();
                showNotification('✅ 已确认加权投放');
            }
        }

        function rejectRecommendation(index) {
            if (confirm('确定不采纳此推荐吗？')) {
                recommendations.splice(index, 1);
                renderRecommendations();
                updateStats();
                showNotification('已跳过此推荐');
            }
        }

        function switchTab(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderRecommendations();
        }

        function searchHotspots() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            if (!keyword) { renderHotspots(); return; }
            const filtered = hotspots.filter(h => h.title.toLowerCase().includes(keyword) || h.tags.some(t => t.toLowerCase().includes(keyword)));
            renderHotspots(filtered);
        }

        function filterHotspots() {
            const source = document.getElementById('sourceFilter').value;
            const region = document.getElementById('regionFilter').value;
            let filtered = hotspots;
            if (source) filtered = filtered.filter(h => h.source.includes(source));
            if (region) filtered = filtered.filter(h => h.region === region);
            renderHotspots(filtered);
        }

        function loadMore() {
            displayCount += 10;
            renderHotspots();
        }

        function refreshHotspots() {
            displayCount = 20;
            mockHotspots.forEach(h => { h.heat = Math.max(5000, h.heat + Math.floor(Math.random() * 500 - 200)); });
            mockHotspots.sort((a,b) => b.heat - a.heat);
            hotspots = mockHotspots;
            renderHotspots();
            generateRecommendations();
            showNotification('🔄 热点已刷新');
        }

        function updateStats() {
            document.getElementById('totalHotspots').textContent = hotspots.length;
            document.getElementById('totalBrands').textContent = brands.length;
            document.getElementById('matchedBrands').textContent = new Set(recommendations.map(r => r.brand)).size;
            document.getElementById('adoptedCount').textContent = recommendations.filter(r => r.status === 'adopted').length;
        }

        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.textContent = msg;
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
